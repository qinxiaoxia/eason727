# 仅「定时四类」：北京 9:30 / 15:30（与 rss-push.yml 轮巡拆分，降低 schedule 漏跑概率）
# Secrets 与 rss-push.yml 相同
name: RSS Push Timed

on:
  # 9:30/15:30 由 Zeabur 按北京时间触发 workflow_dispatch，不用 GitHub schedule
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r rss-wechat-pusher/requirements.txt

      - name: Generate Yijinglab daily RSS (北京 9:30 档，每日一次)
        run: python rss-wechat-pusher/generate_yijinglab_feed.py

      - name: Run RSS Push
        env:
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          FEEDS_JSON: ${{ secrets.FEEDS_JSON }}
          FREEBUF_RSS_MIRROR: ${{ secrets.FREEBUF_RSS_MIRROR }}
          WEWE_RSS_URL: ${{ secrets.WEWE_RSS_URL }}
          LLM_MODELS_JSON: ${{ secrets.LLM_MODELS_JSON }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          # 与仅按时钟判断相比，显式标记「本轮为定时汇总」，延迟错过 slot 窗口时仍能走四类逻辑
          PUSH_SCHEDULED_NOW: "1"
        run: |
          cd rss-wechat-pusher
          cp config.example.py config.py
          python main.py

      - name: Commit pushed state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f rss-wechat-pusher/rss_push.db 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "rss_push.db 无变化，跳过提交"
            exit 0
          fi
          git commit -m "chore: update rss push state"
          git pull --rebase origin main
          git push origin main
