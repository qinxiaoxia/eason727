# RSS 推送到企业微信
# 部署说明：
# - 实时推送：监管机构预警、重大安全事件 → 立即推送
# - 定时推送：每天 9:30、15:30（北京）→ 截至当前时间所有未推送的非实时类文章，按类别合并
# - 推送后标记已推送，避免重复
# Secrets: WECHAT_WEBHOOK, FEEDS_JSON (必填) | LLM_API_KEY, LLM_BASE_URL, LLM_MODEL (可选)
name: RSS Push

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"   # 每 5 分钟（避开整点减少延迟）
  workflow_dispatch:
  repository_dispatch:   # 外部定时服务可调用 API 触发，作为 schedule 不生效时的备用

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r rss-wechat-pusher/requirements.txt

      - name: Restore DB
        uses: actions/cache@v4
        with:
          path: ~/.rss-wechat-pusher
          key: rss-push-db-${{ runner.os }}-v1

      - name: Run RSS Push
        env:
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          FEEDS_JSON: ${{ secrets.FEEDS_JSON }}
          WEWE_RSS_URL: ${{ secrets.WEWE_RSS_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          PUSH_SCHEDULED_NOW: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch') && '1' || '' }}
        run: |
          cd rss-wechat-pusher
          cp config.example.py config.py
          python main.py
