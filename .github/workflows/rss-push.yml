# RSS 推送到企业微信
# 部署说明：
# - 实时推送：监管机构预警、重大安全事件 → 立即推送
# - 定时推送：每天 9:30、15:30（北京）→ 截至当前时间所有未推送的非实时类文章，按类别合并
# - 推送后标记已推送，避免重复
# Secrets: WECHAT_WEBHOOK, FEEDS_JSON (必填) | LLM_API_KEY, LLM_BASE_URL, LLM_MODELS_JSON 或 LLM_MODEL (可选)
name: RSS Push

on:
  schedule:
    # 双线 cron：① 每 3 小时一轮（0,3,6… UTC 的 :30）② 额外对齐 1/7/13/19 UTC 的 :30（含北京早 9:30、午 15:30）
    - cron: "30 */3 * * *"
    - cron: "30 1,7,13,19 * * *"
  workflow_dispatch:
  repository_dispatch:   # 外部定时服务可调用 API 触发，作为 schedule 不生效时的备用

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r rss-wechat-pusher/requirements.txt

      - name: Run RSS Push
        env:
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          FEEDS_JSON: ${{ secrets.FEEDS_JSON }}
          # 可选：FreeBuf 在 Actions 出口 IP 上常 405，填自建 RSSHub 等镜像全文 URL（如 https://rsshub.xxx/freebuf/articles/web）
          FREEBUF_RSS_MIRROR: ${{ secrets.FREEBUF_RSS_MIRROR }}
          WEWE_RSS_URL: ${{ secrets.WEWE_RSS_URL }}
          LLM_MODELS_JSON: ${{ secrets.LLM_MODELS_JSON }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          # 所有触发方式统一：定时类仅在 9:30/15:30 推送；手动触发与 cron/Zeabur 行为一致
          PUSH_SCHEDULED_NOW: ""
        run: |
          cd rss-wechat-pusher
          cp config.example.py config.py
          python main.py

      - name: Commit pushed state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f rss-wechat-pusher/rss_push.db 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "chore: update rss push state" && git push origin main)
