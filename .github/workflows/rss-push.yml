# RSS 推送到企业微信（轮巡）
# - 北京 6、8、12、14、18 整点轮巡（跳过 10:00/16:00，与 9:30/15:30 定时错峰）；实时两类（20:00–次日 6:00 静默不推）
# - 北京 9:30 / 15:30 定时四类：见 rss-push-timed.yml（与轮巡拆分，减少同文件多 cron 漏跑）
# - 推送后标记已推送，避免重复
# Secrets: WECHAT_WEBHOOK, FEEDS_JSON (必填) | LLM_API_KEY, LLM_BASE_URL, LLM_MODELS_JSON 或 LLM_MODEL (可选)
name: RSS Push

on:
  # 轮巡由 Zeabur（zeabur-cron-trigger）按北京时间触发 workflow_dispatch，不用 GitHub schedule（不稳定）
  workflow_dispatch:
  repository_dispatch:   # 仍可用 API 自定义触发

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # 保证后续 git pull --rebase 正常（默认 depth=1 偶发 rebase 问题）
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r rss-wechat-pusher/requirements.txt

      - name: Run RSS Push
        env:
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          FEEDS_JSON: ${{ secrets.FEEDS_JSON }}
          # 可选：FreeBuf 在 Actions 出口 IP 上常 405，填自建 RSSHub 等镜像全文 URL（如 https://rsshub.xxx/freebuf/articles/web）
          FREEBUF_RSS_MIRROR: ${{ secrets.FREEBUF_RSS_MIRROR }}
          WEWE_RSS_URL: ${{ secrets.WEWE_RSS_URL }}
          LLM_MODELS_JSON: ${{ secrets.LLM_MODELS_JSON }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          # 可选：RSS_PUSH_MODE=poll|scheduled 强制本轮只跑轮巡或只跑定时；留空则按北京时间自动判断
          PUSH_SCHEDULED_NOW: ""
        run: |
          cd rss-wechat-pusher
          cp config.example.py config.py
          python main.py

      - name: Commit pushed state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f rss-wechat-pusher/rss_push.db 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "rss_push.db 无变化，跳过提交"
            exit 0
          fi
          git commit -m "chore: update rss push state"
          # 远端可能在此期间有新提交（你本地 push 等），先 rebase 再推避免 rejected
          git pull --rebase origin main
          git push origin main
